name: CI

on:
  push:
    branches: [ "main" ]

env:
  # Dynamic construction: username/github-repo-name
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/${{ vars.IMAGE_NAME }}
  REGISTRY: ${{ vars.REGISTRY }}
  
jobs:
  build-and-push:
    runs-on: ubuntu-latest 
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ vars.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}


      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
  
  deploy:
    needs: build-and-push # It will not start until the previous job has successfully completed.
    runs-on: self-hosted 
    
    steps:
      - name: Code checkout (Manifiesto K8s)
        uses: actions/checkout@v4

      - name: Set up kubectl
        run: |
          # Install kubectl if not already available
          if ! command -v kubectl &> /dev/null; then
            curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x kubectl
            sudo mv kubectl /usr/local/bin/
          fi

      - name: Update deployment image
        run: |
          # Update the deployment with the new image using abbreviated SHA
          $sha = $env:GITHUB_SHA.Substring(0, 7)
          kubectl set image deployment/${{ env.IMAGE_NAME }} ${{ env.IMAGE_NAME }}=${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME}}/${{ env.IMAGE_NAME }}:sha-$sha
          
      - name: Wait for deployment rollout
        run: |
          # Wait for the deployment to complete
          kubectl rollout status deployment/${{ env.IMAGE_NAME }} --timeout=30s
      
      - name: Verify deployment
        run: |
          # Get deployment status
          kubectl get deployment ${{ env.IMAGE_NAME }}
          
          # Get pod status
          kubectl get pods -l app=${{ env.IMAGE_NAME }}
          
          # Show recent events
          kubectl get events --sort-by='.lastTimestamp' | Select-Object -Last 10
